<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Mechify</title>
    <link href="/src/style.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }
    </style>
  </head>
  <body
    class="bg-gray-100 text-gray-800 antialiased h-screen flex flex-col overflow-hidden"
  >
    <header class="bg-slate-900 border-b border-slate-700 shadow-lg z-50">
      <div
        class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between"
      >
        <a
          href="/index.html"
          class="flex items-center gap-3 hover:cursor-pointer group"
        >
          <h1
            class="text-2xl font-bold tracking-tighter text-white transition-transform group-hover:scale-105"
          >
            Mech<span class="text-emerald-500">ify</span>
          </h1>
        </a>
      </div>
    </header>

    <main class="grow flex flex-row bg-white">
      <div class="w-full lg:w-1/2 flex items-center justify-center p-12">
        <div class="w-full max-w-md">
          <div class="mb-10">
            <h2 class="text-4xl font-extrabold text-gray-950 tracking-tighter">
              Welcome back
            </h2>
            <p class="text-slate-600 mt-2 text-lg">
              Sign in to manage your jobs
            </p>
          </div>

          <form id="loginForm" class="space-y-6">
            <div>
              <label
                for="email"
                class="block text-sm font-semibold text-slate-700 mb-1.5"
              >
                Email Address
              </label>
              <input
                type="email"
                id="email"
                name="email"
                required
                class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-emerald-300 focus:border-emerald-500 transition-colors outline-none"
                placeholder="mechanic@shop.com"
              />
            </div>

            <div>
              <div class="flex justify-between mb-1.5">
                <label
                  for="password"
                  class="block text-sm font-semibold text-slate-700"
                >
                  Password
                </label>
                <a
                  href="#"
                  class="text-sm text-emerald-600 hover:text-emerald-700 font-medium transition-colors"
                >
                  Forgot?
                </a>
              </div>
              <div class="relative">
                <input
                  type="password"
                  id="password"
                  name="password"
                  required
                  class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-emerald-300 focus:border-emerald-500 transition-colors outline-none"
                  placeholder="••••••••"
                />
                <button
                  type="button"
                  id="togglePassword"
                  class="absolute inset-y-0 right-0 flex items-center px-4 text-slate-500 hover:text-emerald-600 transition-colors"
                >
                  Show
                </button>
              </div>
            </div>

            <button
              type="submit"
              class="group relative w-full h-14 border-2 border-emerald-600 text-emerald-600 font-bold rounded-lg overflow-hidden transition-colors duration-500 hover:text-white active:scale-95 shadow-lg shadow-emerald-500/10"
            >
              <div
                class="absolute inset-0 top-full bg-emerald-600 transition-all duration-700 ease-in-out group-hover:top-0"
              ></div>
              <span class="relative z-10">Sign In</span>
            </button>
          </form>
        </div>
      </div>

      <div
        class="hidden lg:flex flex-col items-center justify-center w-1/2 h-full p-12 text-center bg-emerald-100 rounded-l-[4rem]"
      >
        <img
          src="/robot.png"
          alt="Robot mascot"
          class="w-full max-w-sm h-auto animate-float drop-shadow-2xl"
        />
        <h3 class="text-emerald-600 text-4xl font-bold tracking-tighter mt-10">
          Ready to work?
        </h3>
        <p class="text-emerald-700 mt-4 text-lg max-w-sm leading-relaxed">
          Log in to access your dashboard and manage jobs efficiently.
        </p>
      </div>
    </main>

    <script type="module" src="/src/scripts/auth.js"></script>
  </body>
</html>
