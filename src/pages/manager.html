<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manager Dashboard | Mechify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/manager.css" />
  </head>
  <body class="bg-black min-h-screen">
    <header
      class="bg-slate-900 border-b border-slate-700 shadow-lg sticky top-0 z-50"
    >
      <div
        class="max-w-full mx-auto px-6 py-3 flex items-center justify-between"
      >
        <a href="index.html" class="flex items-center gap-3">
          <h1 class="text-2xl font-bold tracking-tighter text-white">
            Mech<span class="text-emerald-500">ify</span>
          </h1>
        </a>

        <div class="flex items-center gap-6">
          <div
            class="hidden md:flex flex-col items-end border-r border-slate-700 pr-6"
          >
            <span
              class="text-slate-400 text-xs uppercase tracking-widest font-semibold"
              >Active Session</span
            >
            <span id="user-display-email" class="text-white text-sm font-medium"
              >---</span
            >
          </div>

          <div class="flex items-center gap-3">
            <div
              class="h-10 w-10 rounded-full bg-emerald-500 flex items-center justify-center text-slate-900 font-bold"
            >
              <span id="user-initials">?</span>
            </div>
            <div class="flex flex-col">
              <span
                id="user-display-role"
                class="text-white text-sm font-bold leading-none capitalize"
                >---</span
              >
              <span
                class="text-emerald-400 text-[10px] font-bold uppercase mt-1"
                >Online</span
              >
            </div>
          </div>

          <button
            onclick="logout()"
            class="ml-4 bg-slate-800 hover:bg-red-500/10 hover:text-red-500 text-slate-300 px-4 py-2 rounded-lg border border-slate-700 transition-all duration-300 text-sm font-semibold flex items-center gap-2 group cursor-pointer"
          >
            <span>Logout</span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4 group-hover:translate-x-1 transition-transform"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              />
            </svg>
          </button>
        </div>
      </div>

      <nav class="bg-slate-800/50 border-t border-slate-700/50 px-6">
        <div class="flex gap-1" id="nav-container">
          <button
            onclick="switchTab('dashboard')"
            class="nav-btn active px-4 py-3 text-sm font-bold text-emerald-500 border-b-2 border-emerald-500 transition-all"
          >
            Dashboard
          </button>
          <button
            onclick="switchTab('customers')"
            class="nav-btn px-4 py-3 text-sm font-bold text-slate-400 border-b-2 border-transparent transition-all"
          >
            Customers
          </button>
          <button
            onclick="switchTab('services')"
            class="nav-btn px-4 py-3 text-sm font-bold text-slate-400 border-b-2 border-transparent transition-all"
          >
            Services
          </button>
          <button
            onclick="switchTab('workorders')"
            class="nav-btn px-4 py-3 text-sm font-bold text-slate-400 border-b-2 border-transparent transition-all"
          >
            Work Orders
          </button>
          <button
            onclick="switchTab('schedule')"
            class="nav-btn px-4 py-3 text-sm font-bold text-slate-400 border-b-2 border-transparent transition-all"
          >
            Shop Schedule
          </button>
        </div>
      </nav>
    </header>

    <main id="tab-content" class="p-8 animate-fade-in text-white">
      <div class="flex items-center justify-center h-64">
        <div
          class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-500"
        ></div>
      </div>
    </main>

    <script type="module" src="../scripts/manager/controller.js"></script>
  </body>
</html>
